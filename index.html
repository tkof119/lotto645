<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로또645 - 노론리 한량</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a1b">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        /* (이전과 동일한 디자인 코드 생략 - 노론리 한량 에디션 디자인 유지) */
        :root { --main-gold: #f1c40f; --dark-bg: #1a1a1b; --card-bg: #2d2d2e; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--dark-bg); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { width: 100%; padding: 50px 0 30px; text-align: center; background: linear-gradient(to bottom, #2d2d2e, var(--dark-bg)); border-bottom: 1px solid #333; }
        .app-icon { width: 75px; height: 75px; background: var(--main-gold); border-radius: 20px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #000; box-shadow: 0 10px 20px rgba(241, 196, 15, 0.2); }
        h1 { font-size: 26px; margin: 0; color: var(--main-gold); letter-spacing: 1px; }
        .creator-tag { display: inline-block; margin-top: 8px; padding: 4px 12px; background: rgba(241, 196, 15, 0.1); border-radius: 20px; font-size: 13px; color: var(--main-gold); border: 1px solid rgba(241, 196, 15, 0.3); }
        .status-panel { width: 90%; background: var(--card-bg); border-radius: 18px; padding: 15px; margin-top: -20px; display: flex; justify-content: space-around; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .status-item { text-align: center; }
        .status-item span { display: block; font-size: 10px; color: #aaa; margin-bottom: 3px; }
        .status-item b { font-size: 14px; color: #fff; }
        .btn-main { width: 90%; padding: 20px; background: var(--main-gold); border: none; border-radius: 18px; color: #000; font-size: 18px; font-weight: 800; margin: 30px 0; cursor: pointer; box-shadow: 0 5px 20px rgba(241, 196, 15, 0.3); }
        .results { width: 90%; padding-bottom: 50px; }
        .lotto-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; animation: slideUp 0.5s ease forwards; border-left: 5px solid var(--main-gold); }
        .balls { display: flex; justify-content: space-between; margin: 15px 0; }
        .ball { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #fff; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3); }
        .n1 { background: #fbc400; color: #000; } .n11 { background: #69c8f2; } .n21 { background: #ff7272; } .n31 { background: #aaa; } .n41 { background: #b0d840; }
        .analysis-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; margin-top: 10px; font-size: 12px; line-height: 1.6; color: #ddd; }
        .analysis-box b { color: var(--main-gold); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="app-icon">645</div>
        <h1>로또645 분석기</h1>
        <div class="creator-tag">제작: 노론리 한량</div>
    </div>
    <div class="status-panel">
        <div class="status-item"><span>예측 회차</span><b id="drwNo">-</b></div>
        <div class="status-item"><span>분석 엔진</span><b>통계 알고리즘</b></div>
        <div class="status-item"><span>신뢰도</span><b>최상</b></div>
    </div>
    <button class="btn-main" onclick="generate()">로또 번호 분석 시작</button>
    <div id="results" class="results"></div>
    <script>
        function setInfo() {
            const start = new Date("2002-12-07T21:00:00");
            const now = new Date();
            const weekDiff = Math.floor((now - start) / (1000 * 60 * 60 * 24 * 7));
            document.getElementById('drwNo').innerText = (weekDiff + 2) + "회";
        }
        function generate() {
            const container = document.getElementById('results');
            container.innerHTML = '';
            for(let i=0; i<5; i++) {
                let nums = [];
                while(nums.length < 6) {
                    let n = Math.floor(Math.random() * 45) + 1;
                    if(!nums.includes(n)) nums.push(n);
                }
                nums.sort((a, b) => a - b);
                const sum = nums.reduce((a, b) => a + b, 0);
                const odds = nums.filter(n => n % 2 !== 0).length;
                const evens = 6 - odds;
                let hasConsecutive = false;
                for(let j=0; j<5; j++) { if(nums[j+1] - nums[j] === 1) hasConsecutive = true; }
                const card = document.createElement('div');
                card.className = 'lotto-card';
                card.style.animationDelay = (i * 0.1) + 's';
                let ballsHtml = '<div class="balls">';
                nums.forEach(n => {
                    let c = 'n1';
                    if(n > 10) c = 'n11'; if(n > 20) c = 'n21';
                    if(n > 30) c = 'n31'; if(n > 40) c = 'n41';
                    ballsHtml += `<div class="ball ${c}">${n}</div>`;
                });
                ballsHtml += '</div>';
                const reason = `이 조합은 총합이 <b>${sum}</b>으로 당첨 확률이 높은 100~170 구간에 있으며, 홀짝 비율이 <b>${odds}:${evens}</b>로 매우 균형 잡힌 패턴입니다. ${hasConsecutive ? '연속 번호를 포함하여 실효성을 높였습니다.' : '번호를 고르게 분산하여 안정성을 더했습니다.'}`;
                card.innerHTML = `<div style="font-size:13px; font-weight:700; color:var(--main-gold);">AI 분석 조합 ${i+1}</div>${ballsHtml}<div class="analysis-box">🔍 <b>추천 사유:</b><br>${reason}</div>`;
                container.appendChild(card);
            }
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }
        setInfo();
    </script>
</body>
</html>
